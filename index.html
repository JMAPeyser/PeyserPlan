<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeyserPlan — Revision Planner</title>
  <meta name="description" content="PeyserPlan: A smart revision planner for GCSE and A-Level students. Plan your exams, schedule topics, and track your confidence." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header id="header">
    <img src="images/computer-dog.png" class="logo-img" alt="PeyserPlan logo"
         onerror="this.outerHTML='<div class=\'logo-placeholder\'>🐾</div>'" />
    <h1>PeyserPlan</h1>
    <span class="header-sub">GCSE &amp; A-Level Revision Planner</span>
    <div class="header-right">
      <nav id="month-nav">
        <button id="prev-month" title="Previous month">&#8249;</button>
        <span id="month-label"></span>
        <button id="next-month" title="Next month">&#8250;</button>
      </nav>
      <div id="export-actions" style="display: flex; gap: 8px; margin-left: 16px; padding-left: 16px; border-left: 1px solid var(--border);">
        <button id="export-ics-btn" class="header-action-btn" title="Export to Calendar app (.ics)">📥 .ICS</button>
        <button id="export-pdf-btn" class="header-action-btn" title="Print or Save as PDF">🖨️ PDF</button>
        <a href="https://ko-fi.com/peyserplan" target="_blank" rel="noopener noreferrer" class="donate-btn" title="Support PeyserPlan">☕ Donate</a>
      </div>
    </div>
  </header>

  <!-- ── SIDEBAR ────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>My Exams</h2>
      <div id="add-exam-form">
        <input id="new-exam-name" type="text" placeholder="Exam name (e.g. Maths Paper 1)" />
        <input id="new-exam-date" type="date" />
        <button id="add-exam-btn">+ Add Exam</button>
      </div>
      <div id="autogen-buttons">
        <button id="autogen-open-btn" title="Auto-generate a revision plan">🪄 Auto-Generate Plan</button>
        <button id="clear-plan-btn" title="Clear all generated revision sessions">🗑 Clear Plan</button>
      </div>
    </div>
    <div id="exam-list">
      <!-- Rendered by app.js -->
    </div>
  </aside>

  <!-- ── MAIN CALENDAR ──────────────────────────────────────── -->
  <main id="main">
    <div id="calendar-dow">
      <div class="dow-label">Mon</div>
      <div class="dow-label">Tue</div>
      <div class="dow-label">Wed</div>
      <div class="dow-label">Thu</div>
      <div class="dow-label">Fri</div>
      <div class="dow-label">Sat</div>
      <div class="dow-label">Sun</div>
    </div>
    <div id="calendar-grid">
      <!-- Rendered by app.js -->
    </div>
  </main>

  <!-- ── RIGHT SIDEBAR (DAY DETAILS) ────────────────────────── -->
  <aside id="right-sidebar">
    <div id="right-sidebar-header">
      <img src="images/assess-dog.png" alt="" style="width:44px;height:44px;object-fit:contain;"
           onerror="this.style.display='none'" />
      <div class="right-sidebar-date">
        <h2 id="right-sidebar-date-heading"></h2>
        <p id="right-sidebar-date-subtitle"></p>
      </div>
    </div>
    <div id="right-sidebar-body">
      <!-- Rendered by overlay.js -->
    </div>
  </aside>

  <!-- ── AUTO-GENERATE MODAL ──────────────────────────────── -->
  <div id="autogen-modal" class="modal-backdrop" style="display:none;">
    <div class="modal-card">
      <div class="modal-header">
        <img src="images/science-dog.png" alt="" class="modal-icon"
             onerror="this.style.display='none'" />
        <div>
          <h2>Auto-Generate Revision Plan</h2>
          <p class="modal-subtitle">Fill your calendar with smart revision sessions</p>
        </div>
      </div>
      <div class="modal-body">
        <label for="autogen-hours">Hours of revision per day</label>
        <input id="autogen-hours" type="number" min="0.5" max="12" step="0.5" value="2" />
        <label for="autogen-topics">Topics per day</label>
        <input id="autogen-topics" type="number" min="1" max="20" step="1" value="4" />
        <div class="modal-warning">
          <span>⚠️</span>
          <span>This will <strong>replace</strong> all existing revision sessions on the calendar.</span>
        </div>
      </div>
      <div class="modal-footer">
        <button id="autogen-cancel-btn" class="modal-btn-secondary">Cancel</button>
        <button id="autogen-confirm-btn" class="modal-btn-primary">Generate Plan</button>
      </div>
    </div>
  </div>

</div><!-- /#app -->

<script src="app.js"></script>
<script src="drag-drop.js"></script>
<script src="overlay.js"></script>

</body>
</html>
